<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        header{
            background:#0078ff;
            color:white;
            text-align:center;
            padding:20px;
        }

        .hero{
            text-align:center;
            padding:80px 20px;
        }

        .hero h1{
            font-size:50px;
            margin-bottom:20px;
        }

        .hero p{
            font-size:20px;
            margin-bottom:20px;
        }

        button{
            background:#0078ff;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:5px;
            cursor:pointer;
            font-size:18px;
        }

        button:hover{
            opacity:0.8;
        }

        footer{
            text-align:center;
            padding:20px;
            background:#222;
            color:white;
            margin-top:50px;
        }
    </style>
</head>
<body>

<header>
    <h2>Nasir's Website</h2>
</header>

<section class="hero">
    <h1>Welcome to My Website</h1>
    <p>This website was created using VS Code.</p>

    <button onclick="showMessage()">
        Click Me
    </button>
</section>

<footer>
    © 2026 My First Website
</footer>

<script>
    function showMessage(){
        alert("Congratulations! Your website is working.");
    }
</script>

</body>
</html>
